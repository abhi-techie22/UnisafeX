name: unisafex
description: UniSafeX - Premium Tourism App for Foreigners in India
publish_to: 'none'
version: 1.0.4+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # Maps
  maplibre_gl: ^0.26.1 

  # Localization
  easy_localization: ^3.0.7

  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.1
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  country_flags: ^3.0.1
  country_picker: ^2.0.26
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  dio: ^5.7.0

  # Icons
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/
  fonts:
    - family: DisplayFont
      fonts:
        - asset: assets/fonts/ClashDisplay-Variable.ttf
    - family: BodyFont
      fonts:
        - asset: assets/fonts/GeneralSans-Variable.ttf
